<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Altimeter gauge -->
  <g transform="translate(115, 18)">
    <!-- Gauge box -->
    <rect x="0" y="0" width="72" height="52" rx="6" stroke="white" stroke-width="2" fill="none" opacity="0.85"/>
    <!-- Tick marks on left side -->
    <line x1="0" y1="52" x2="0" y2="10" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="-4" y1="48" x2="0" y2="48" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="-3" y1="43" x2="0" y2="43" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="-4" y1="38" x2="0" y2="38" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="-3" y1="33" x2="0" y2="33" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="-4" y1="28" x2="0" y2="28" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="-3" y1="23" x2="0" y2="23" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="-4" y1="18" x2="0" y2="18" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="-3" y1="13" x2="0" y2="13" stroke="white" stroke-width="1" opacity="0.4"/>
    <!-- ALT text -->
    <text x="36" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.9">ALT</text>
    <!-- 28,000 FT text -->
    <text x="36" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="white" opacity="0.9">28,000 FT</text>
  </g>

  <!-- Commercial airplane - climbing at -35 degrees -->
  <g transform="translate(88, 115) rotate(-35)">
    <!-- Main fuselage -->
    <path d="M-50,0 C-50,-5 -45,-7 -40,-7 L40,-7 C50,-7 58,-4 62,0 C58,4 50,7 40,7 L-40,7 C-45,7 -50,5 -50,0 Z" fill="white" opacity="0.95"/>

    <!-- Nose cone -->
    <path d="M55,-5 Q68,-2 72,0 Q68,2 55,5" fill="white" opacity="0.95"/>

    <!-- Cockpit windshield -->
    <path d="M56,-4 Q62,-2 64,0 Q62,2 56,4 L54,3 Q58,1 58,0 Q58,-1 54,-3 Z" fill="white" opacity="0.5"/>

    <!-- Main wings - swept back -->
    <path d="M5,7 L-15,48 L-10,48 L20,7 Z" fill="white" opacity="0.9"/>
    <path d="M5,-7 L-15,-48 L-10,-48 L20,-7 Z" fill="white" opacity="0.9"/>

    <!-- Wing leading edge thickness -->
    <path d="M5,7 L-15,48 L-17,46 L3,7 Z" fill="white" opacity="0.7"/>
    <path d="M5,-7 L-15,-48 L-17,-46 L3,-7 Z" fill="white" opacity="0.7"/>

    <!-- Engine pod left - parallel to fuselage (nacelle shape) -->
    <rect x="-8" y="16" width="12" height="5" rx="2.5" fill="white" opacity="0.85"/>
    <!-- Engine intake -->
    <ellipse cx="-8" cy="18.5" rx="1" ry="2.5" fill="white" opacity="0.65"/>

    <!-- Engine pod right - parallel to fuselage (nacelle shape) -->
    <rect x="-8" y="-21" width="12" height="5" rx="2.5" fill="white" opacity="0.85"/>
    <!-- Engine intake -->
    <ellipse cx="-8" cy="-18.5" rx="1" ry="2.5" fill="white" opacity="0.65"/>

    <!-- Vertical tail fin (dorsal) -->
    <path d="M-42,-7 L-52,-28 L-46,-28 L-36,-7 Z" fill="white" opacity="0.9"/>

    <!-- Horizontal stabilizer - left (below) -->
    <path d="M-42,6 L-52,22 L-46,22 L-36,6 Z" fill="white" opacity="0.85"/>
    <!-- Horizontal stabilizer - right (above) - mirror of left -->
    <path d="M-42,-6 L-52,-22 L-46,-22 L-36,-6 Z" fill="white" opacity="0.85"/>

    <!-- Window line -->
    <g opacity="0.25">
      <circle cx="40" cy="0" r="1" fill="#003a70"/>
      <circle cx="36" cy="0" r="1" fill="#003a70"/>
      <circle cx="32" cy="0" r="1" fill="#003a70"/>
      <circle cx="28" cy="0" r="1" fill="#003a70"/>
      <circle cx="24" cy="0" r="1" fill="#003a70"/>
      <circle cx="20" cy="0" r="1" fill="#003a70"/>
      <circle cx="16" cy="0" r="1" fill="#003a70"/>
      <circle cx="12" cy="0" r="1" fill="#003a70"/>
      <circle cx="8" cy="0" r="1" fill="#003a70"/>
      <circle cx="4" cy="0" r="1" fill="#003a70"/>
      <circle cx="0" cy="0" r="1" fill="#003a70"/>
      <circle cx="-4" cy="0" r="1" fill="#003a70"/>
      <circle cx="-8" cy="0" r="1" fill="#003a70"/>
      <circle cx="-12" cy="0" r="1" fill="#003a70"/>
      <circle cx="-16" cy="0" r="1" fill="#003a70"/>
      <circle cx="-20" cy="0" r="1" fill="#003a70"/>
      <circle cx="-24" cy="0" r="1" fill="#003a70"/>
      <circle cx="-28" cy="0" r="1" fill="#003a70"/>
      <circle cx="-32" cy="0" r="1" fill="#003a70"/>
    </g>
  </g>

  <!-- Subtle shadow -->
  <ellipse cx="95" cy="178" rx="45" ry="5" fill="white" opacity="0.12"/>
</svg>
